<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写真を加工する | Re:sellerアシスタント</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="brand">Re:sellerアシスタント</div>
    <span class="badge badge-student">Re:cheスクール会員</span>
  </header>

  <div class="container">
    <a href="app.html" class="back-link">← ホームへ戻る</a>
    <h2 class="page-title">写真を加工する</h2>
    <p class="page-lead">背景を自動で白く加工して、瀬楽ちかこさん基準の「もっと寄りで」アドバイスもセットでお返しします。</p>

    <form id="photo-form" onsubmit="event.preventDefault(); runPhoto();">
      <div class="section">
        <div class="subtitle">加工したい写真</div>
        <div class="upload-zone" id="upload-zone">
          <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="M21 15l-5-5L8 18"/></svg>
          <div class="upload-text"><b>写真を選択</b>（複数枚OK・最大6枚）</div>
          <input type="file" id="upload-input" accept="image/*" multiple>
        </div>
        <div class="preview-grid" id="preview"></div>
      </div>

      <button class="btn" type="submit" data-feature-submit>背景を白く加工する</button>
    </form>

    <div id="result-area" style="margin-top: 14px;"></div>
  </div>

  <nav class="app-nav">
    <a href="app.html" data-nav="home">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12L12 4l9 8"/><path d="M5 10v10h14V10"/></svg>
      ホーム
    </a>
    <a href="feature_history.html" data-nav="history">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
      履歴
    </a>
    <a href="#" data-nav="help" onclick="alert('写真をアップロードして「背景を白く加工する」を押すだけ。'); return false;">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 5 0c0 2-2.5 2-2.5 4"/><circle cx="12" cy="17" r="0.5" fill="currentColor"/></svg>
      ヘルプ
    </a>
  </nav>
</div>

<script src="../assets/app.js"></script>
<script>
  requireLogin();
  setupImageUpload('upload-zone', 'upload-input', 'preview');

  function runPhoto() {
    mockProcess('#result-area', 2000, () => {
      document.getElementById('result-area').innerHTML = `
        <div class="result">
          <div class="result-label">加工結果</div>

          <div class="result-block">
            <h5>背景白化 完了（Before / After）</h5>
            <div class="ba-grid">
              <div class="ba-item">
                <div class="ba-label">BEFORE</div>
                <div class="ba-image">
                  <svg viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="2"><rect x="8" y="12" width="44" height="40" rx="2" fill="#e6e3dc"/><path d="M30 26v18M22 32l8-6 8 6"/></svg>
                </div>
              </div>
              <div class="ba-item">
                <div class="ba-label after">AFTER</div>
                <div class="ba-image after">
                  <svg viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="2"><path d="M30 18c-4 0-7 3-7 7v18c0 1 1 2 2 2h10c1 0 2-1 2-2V25c0-4-3-7-7-7zM23 30h14"/></svg>
                </div>
              </div>
            </div>
            <button class="copy-btn">画像をダウンロード</button>
          </div>

          <div class="result-block">
            <h5>写真スタイル診断（瀬楽ちかこさん基準）</h5>
            <div class="result-text">
・全体の構図：ヨリ・ヒキのバランス良好（◎）
・光：自然光寄りで色味は信頼できる仕上がり
・改善1：ブランドタグの寄り写真がもう1枚あると安心感が上がります
・改善2：着用シーン（マネキンorコーデ）を1枚足すと回転率が約1.3倍上がりやすいです
・改善3：床に直置きより、壁にピン留めの方が形が綺麗に出ます</div>
          </div>

          <div class="result-block">
            <h5>このまま使えるサムネ順</h5>
            <div class="result-text">1枚目：背景白化した正面アップ（このAI加工版を推奨）
2枚目：全身またはマネキン着用
3枚目：素材アップ（質感わかるもの）
4枚目：ブランドタグの寄り
5枚目：気になる傷や汚れがあれば誠実に1枚</div>
          </div>
        </div>
        <button class="btn btn-outline" onclick="location.href='app.html'">ホームへ戻る</button>
      `;
      addHistory({ type: 'photo', title: '写真加工 1件' });
    });
  }
</script>
</body>
</html>
