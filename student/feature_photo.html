<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写真を加工する | Re:sellerアシスタント</title>
<link rel="stylesheet" href="../assets/style.css">
<style>
  .photo-unlimited-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f0f7f5;
    border: 1px solid #c2ddd8;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    color: var(--accent2);
    font-weight: 700;
    margin-bottom: 14px;
  }
  .ba-image img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .progress-bar-wrap {
    background: var(--line);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
    margin: 8px 0 4px;
  }
  .progress-bar-inner {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    width: 0%;
    transition: width 0.4s ease;
  }
  .loading-detail {
    font-size: 12px;
    color: var(--sub);
    text-align: center;
    margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .single-upload-preview {
    width: 100%;
    max-height: 240px;
    object-fit: contain;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--soft);
    display: block;
    margin-top: 12px;
  }
  .upload-selected-name {
    font-size: 12px;
    color: var(--sub);
    margin-top: 6px;
    letter-spacing: 0.02em;
  }
  .app-footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--sub);
    padding: 8px 0 24px;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="brand">Re:sellerアシスタント</div>
    <span class="badge badge-student">Re:cheスクール会員</span>
  </header>

  <div class="container">
    <a href="app.html" class="back-link">← ホームへ戻る</a>
    <h2 class="page-title">写真を加工する</h2>
    <p class="page-lead">画像をアップロードするだけで、AIが背景を自動で削除します。ブラウザ内完結・データ送信なし。</p>

    <div class="photo-unlimited-badge">写真加工は無制限です</div>

    <!-- Step 1: アップロードエリア -->
    <div id="step-upload" class="section">
      <div class="subtitle">加工したい写真を選択</div>
      <div class="upload-zone" id="upload-zone">
        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="M21 15l-5-5L8 18"/></svg>
        <div class="upload-text"><b>写真を選択</b>（1枚・JPG / PNG / WebP）</div>
        <input type="file" id="upload-input" accept="image/*">
      </div>
      <img id="preview-img" class="single-upload-preview" style="display:none;" alt="プレビュー">
      <div id="preview-name" class="upload-selected-name"></div>
    </div>

    <!-- Step 2: 加工ボタン（画像選択後に表示） -->
    <div id="step-action" style="display:none;">
      <button class="btn" id="process-btn" onclick="startProcessing()">背景を削除する</button>
    </div>

    <!-- Step 3: 処理中表示 -->
    <div id="step-processing" style="display:none; margin-top:14px;">
      <div class="result" style="text-align:center; padding:24px 16px;">
        <div class="spinner" style="margin:0 auto 14px;"></div>
        <div id="processing-label" class="loading-text" style="margin-bottom:8px;">AIモデルを準備しています...</div>
        <div class="progress-bar-wrap"><div class="progress-bar-inner" id="progress-bar"></div></div>
        <div class="loading-detail" id="processing-detail">初回のみAIモデルをダウンロードしています。30秒〜1分お待ちください</div>
      </div>
    </div>

    <!-- Step 4: 結果表示 -->
    <div id="step-result" style="display:none; margin-top:14px;">
      <div class="result">
        <div class="result-label">加工完了</div>
        <div class="result-block">
          <h5>背景削除 Before / After</h5>
          <div class="ba-grid">
            <div class="ba-item">
              <div class="ba-label">BEFORE</div>
              <div class="ba-image"><img id="before-img" alt="加工前"></div>
            </div>
            <div class="ba-item">
              <div class="ba-label after">AFTER</div>
              <div class="ba-image after"><img id="after-img" alt="加工後（背景削除）"></div>
            </div>
          </div>
        </div>
      </div>
      <button class="btn" id="download-btn" onclick="downloadResult()">PNG保存</button>
      <button class="btn btn-outline" style="margin-top:8px;" onclick="resetAll()">もう一度試す</button>
    </div>

    <!-- エラー表示 -->
    <div id="step-error" style="display:none; margin-top:14px;">
      <div class="notice" id="error-msg"></div>
      <button class="btn btn-outline" style="margin-top:8px;" onclick="resetAll()">もう一度試す</button>
    </div>
  </div>

  <nav class="app-nav">
    <a href="app.html" data-nav="home">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12L12 4l9 8"/><path d="M5 10v10h14V10"/></svg>
      ホーム
    </a>
    <a href="feature_history.html" data-nav="history">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
      履歴
    </a>
    <a href="#" data-nav="help" onclick="alert('写真を選択して「背景を削除する」を押すだけ。ブラウザ内で完結します。'); return false;">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 5 0c0 2-2.5 2-2.5 4"/><circle cx="12" cy="17" r="0.5" fill="currentColor"/></svg>
      ヘルプ
    </a>
  </nav>

  <p class="app-footer-note">動作確認はChrome / Safari 最新版で</p>
</div>

<script src="../assets/app.js"></script>
<script type="module">
  requireLogin();

  // WebAssembly 対応チェック
  if (typeof WebAssembly === 'undefined') {
    showError('お使いのブラウザは対応していません。最新のChrome / Safari / Edgeをご利用ください。');
  }

  // ---- ファイル選択 ----
  const zone = document.getElementById('upload-zone');
  const input = document.getElementById('upload-input');
  const previewImg = document.getElementById('preview-img');
  const previewName = document.getElementById('preview-name');

  let selectedFile = null;
  let resultBlob = null;

  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = 'var(--accent)'; });
  zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; });
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.style.borderColor = '';
    const f = e.dataTransfer.files[0];
    if (f) handleFile(f);
  });

  input.addEventListener('change', e => {
    const f = e.target.files[0];
    if (f) handleFile(f);
  });

  function handleFile(file) {
    if (!file.type.startsWith('image/')) {
      showError('画像ファイルを選択してください（JPG / PNG / WebP）。');
      return;
    }
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      previewImg.src = ev.target.result;
      previewImg.style.display = 'block';
      previewName.textContent = file.name + '（' + formatBytes(file.size) + '）';
    };
    reader.readAsDataURL(file);
    document.getElementById('step-action').style.display = 'block';
    document.getElementById('step-result').style.display = 'none';
    document.getElementById('step-error').style.display = 'none';
    resultBlob = null;
  }

  function formatBytes(b) {
    if (b < 1024 * 1024) return Math.round(b / 1024) + ' KB';
    return (b / (1024 * 1024)).toFixed(1) + ' MB';
  }

  // ---- 5MB以上はリサイズ ----
  async function prepareImageBlob(file) {
    const MAX_SIDE = 1600;
    const MAX_BYTES = 5 * 1024 * 1024;
    if (file.size <= MAX_BYTES) return file;

    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        let w = img.naturalWidth, h = img.naturalHeight;
        if (w > MAX_SIDE || h > MAX_SIDE) {
          const ratio = Math.min(MAX_SIDE / w, MAX_SIDE / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => {
          if (blob) resolve(blob);
          else reject(new Error('リサイズに失敗しました'));
        }, 'image/png');
      };
      img.onerror = reject;
      img.src = url;
    });
  }

  // ---- 処理本体 ----
  let bgRemovalLib = null;

  async function loadLib() {
    if (bgRemovalLib) return bgRemovalLib;
    // CDN候補を順番に試す
    const CANDIDATES = [
      'https://esm.sh/@imgly/background-removal@1.6.0',
      'https://esm.sh/@imgly/background-removal@1.5.9',
      'https://esm.sh/@imgly/background-removal@1.4.5'
    ];
    for (const url of CANDIDATES) {
      try {
        const mod = await import(url);
        bgRemovalLib = mod;
        return mod;
      } catch (e) {
        console.warn('CDN failed:', url, e.message);
      }
    }
    throw new Error('ライブラリの読み込みに失敗しました。ネットワーク接続を確認してください。');
  }

  // グローバルに公開（onclickから呼べるよう）
  window.startProcessing = async function() {
    if (!selectedFile) return;

    showStep('processing');
    setProgress(5, 'AIモデルを準備しています...', '初回のみAIモデルをダウンロードしています。30秒〜1分お待ちください');

    const isCached = localStorage.getItem('photo_models_cached') === 'true';
    if (isCached) {
      setProgress(30, 'キャッシュから読み込み中...', 'キャッシュから即読み込みします');
    }

    try {
      const lib = await loadLib();
      setProgress(50, '画像を処理しています...', '背景を分析中...');

      const prepared = await prepareImageBlob(selectedFile);
      setProgress(70, '背景を削除しています...', 'AIが背景領域を特定しています');

      const resultBlobData = await lib.removeBackground(prepared, {
        progress: (key, current, total) => {
          if (total > 0) {
            const pct = Math.round(50 + (current / total) * 40);
            setProgress(pct, '背景を削除しています...', `処理中... ${Math.round((current / total) * 100)}%`);
          }
        }
      });

      setProgress(95, '仕上げ処理中...', 'もうすぐ完了します');

      resultBlob = resultBlobData;
      localStorage.setItem('photo_models_cached', 'true');

      // Before/After 表示
      const beforeUrl = URL.createObjectURL(selectedFile);
      const afterUrl = URL.createObjectURL(resultBlob);
      document.getElementById('before-img').src = beforeUrl;
      document.getElementById('after-img').src = afterUrl;

      setProgress(100, '完了しました', '');

      setTimeout(() => {
        showStep('result');
        addHistory({ type: 'photo', title: '写真加工（背景削除）' });
      }, 400);

    } catch (err) {
      console.error('Background removal error:', err);
      const msg = err.message || '不明なエラー';
      if (msg.includes('ライブラリ') || msg.includes('CDN') || msg.includes('import')) {
        showError('ライブラリの読み込みに失敗しました。ネットワーク接続を確認し、最新のChrome / Safari / Edgeでお試しください。');
      } else {
        showError('処理に失敗しました。別の画像でお試しください。（' + msg + '）');
      }
    }
  };

  window.downloadResult = function() {
    if (!resultBlob) return;
    const url = URL.createObjectURL(resultBlob);
    const a = document.createElement('a');
    const originalName = selectedFile ? selectedFile.name.replace(/\.[^.]+$/, '') : 'result';
    a.href = url;
    a.download = originalName + '_bg-removed.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 3000);
  };

  window.resetAll = function() {
    selectedFile = null;
    resultBlob = null;
    input.value = '';
    previewImg.src = '';
    previewImg.style.display = 'none';
    previewName.textContent = '';
    document.getElementById('step-action').style.display = 'none';
    document.getElementById('step-result').style.display = 'none';
    document.getElementById('step-error').style.display = 'none';
    document.getElementById('step-processing').style.display = 'none';
  };

  // ---- ヘルパー ----
  function showStep(name) {
    ['processing', 'result', 'error'].forEach(s => {
      document.getElementById('step-' + s).style.display = s === name ? 'block' : 'none';
    });
    if (name !== 'result') {
      document.getElementById('step-action').style.display = name === 'processing' ? 'none' : 'block';
    } else {
      document.getElementById('step-action').style.display = 'none';
    }
  }

  function setProgress(pct, label, detail) {
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('processing-label').textContent = label;
    document.getElementById('processing-detail').textContent = detail;
  }

  function showError(msg) {
    document.getElementById('step-error').style.display = 'block';
    document.getElementById('step-processing').style.display = 'none';
    document.getElementById('error-msg').innerHTML = '<b>エラー:</b> ' + msg;
    document.getElementById('step-action').style.display = selectedFile ? 'block' : 'none';
  }
</script>
</body>
</html>
